name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "name=$TAG" >> $GITHUB_OUTPUT
          # Extract major.minor.patch as version code base
          VERSION_CODE=$(echo $TAG | sed 's/\.//g' | sed 's/[^0-9]//g')
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Signature for Release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks
            echo "RELEASE_STORE_FILE=release.jks" >> local.properties
            echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> local.properties
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
          else
            echo "Secret KEYSTORE_BASE64 is missing, you must configure secrets in GitHub Repo Settings!"
          fi

      - name: Build Release APK
        run: ./gradlew assembleDebug
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          BUILD_DATE: ${{ steps.date.outputs.date }}

      - name: Rename APK with version and date
        id: apk
        run: |
          # We search the entire apk folder recursively so it works for both debug and release builds
          APK_PATH=$(find app/build/outputs/apk/ -name '*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK file found!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          # Rename/move it to a consistent name for the next upload/release steps
          mv "$APK_PATH" app/build/outputs/apk/app-debug.apk
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # This tells GitHub what tag to use (e.g., v1.0.35)
          tag_name: "v2.1.${{ github.run_number }}"
          name: "Build v2.1.${{ github.run_number }}"
          body: "Automated manual build of EdgeXplus."
          draft: false
          prerelease: false
          # Ensure this points to the exact path where we moved the APK!
          files: app/build/outputs/apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
